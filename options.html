<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Multi-Row Bookmarks Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #1e1e22;
      color: #ccc;
      margin: 0;
      padding: 40px;
      min-height: 100vh;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 32px;
      color: #fff;
    }
    .setting {
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #999;
      margin-bottom: 6px;
    }
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="color"] {
      width: 40px;
      height: 32px;
      border: 1px solid #555;
      border-radius: 4px;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    input[type="text"] {
      background: #2a2a2e;
      border: 1px solid #555;
      border-radius: 4px;
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      font-family: monospace;
      width: 100px;
    }
    input[type="number"] {
      background: #2a2a2e;
      border: 1px solid #555;
      border-radius: 4px;
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      width: 60px;
    }
    .preset-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .preset {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .preset:hover, .preset.active {
      border-color: #6c8cff;
    }
    .saved {
      color: #6c8cff;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      margin-left: 8px;
    }
    .saved.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>Multi-Row Bookmarks Settings</h1>

  <div class="setting">
    <label>Background Color</label>
    <div class="color-row">
      <input type="color" id="bgColor" value="#3b3b3f">
      <input type="text" id="bgHex" value="#3b3b3f" maxlength="7">
      <span class="saved" id="savedMsg">Saved</span>
    </div>
    <div class="preset-row">
      <div class="preset" style="background:#3b3b3f" data-color="#3b3b3f" title="Dark (default)"></div>
      <div class="preset" style="background:#ffffff; border-color:#ddd" data-color="#ffffff" title="White"></div>
      <div class="preset" style="background:#1e1e2e" data-color="#1e1e2e" title="Darker"></div>
      <div class="preset" style="background:#2b2a33" data-color="#2b2a33" title="Firefox Dark"></div>
      <div class="preset" style="background:#f1f3f5; border-color:#ddd" data-color="#f1f3f5" title="Light gray"></div>
    </div>
  </div>

  <div class="setting">
    <label>Number of Rows</label>
    <input type="number" id="rows" min="1" max="5" value="2">
  </div>

  <script src="options.js"></script>
</body>
</html>
