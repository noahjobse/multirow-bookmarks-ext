<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Multi-Row Bookmarks Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #1e1e22;
      color: #ccc;
      margin: 0;
      padding: 40px;
      min-height: 100vh;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 32px;
      color: #fff;
    }
    .setting {
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #999;
      margin-bottom: 6px;
    }
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="color"] {
      width: 40px;
      height: 32px;
      border: 1px solid #555;
      border-radius: 4px;
      background: none;
      cursor: pointer;
      padding: 0;
    }
    input[type="text"] {
      background: #2a2a2e;
      border: 1px solid #555;
      border-radius: 4px;
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      font-family: monospace;
      width: 100px;
    }
    input[type="number"] {
      background: #2a2a2e;
      border: 1px solid #555;
      border-radius: 4px;
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      width: 60px;
    }
    .preset-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .preset {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .preset:hover, .preset.active {
      border-color: #6c8cff;
    }
    .saved {
      color: #6c8cff;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      margin-left: 8px;
    }
    .saved.show {
      opacity: 1;
    }
    .btn-group {
      display: flex;
      gap: 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #555;
      width: fit-content;
    }
    .btn {
      background: #2a2a2e;
      color: #ccc;
      border: none;
      padding: 7px 16px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-right: 1px solid #555;
      font-family: inherit;
    }
    .btn:last-child {
      border-right: none;
    }
    .btn:hover {
      background: #3a3a3e;
    }
    .btn.active {
      background: #6c8cff;
      color: #fff;
    }
    .slider {
      -webkit-appearance: none;
      width: 240px;
      height: 4px;
      background: #3a3a3e;
      border-radius: 2px;
      outline: none;
    }
    input[type="checkbox"] {
      margin-right: 8px;
      accent-color: #6c8cff;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6c8cff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Multi-Row Bookmarks Settings</h1>

  <span class="saved" id="savedMsg">Saved</span>

  <div class="setting">
    <label>Alignment</label>
    <div class="btn-group" id="alignment">
      <button class="btn" data-value="flex-start">Left</button>
      <button class="btn" data-value="center">Center</button>
      <button class="btn" data-value="flex-end">Right</button>
      <button class="btn" data-value="space-evenly">Spread</button>
    </div>
  </div>

  <div class="setting">
    <label>Text Size <span id="textSizeVal" style="color:#6c8cff">13px</span></label>
    <input type="range" id="textSize" min="8" max="24" value="13" class="slider">
  </div>

  <div class="setting">
    <label>Icon Size <span id="iconSizeVal" style="color:#6c8cff">20px</span></label>
    <input type="range" id="iconSize" min="10" max="36" value="20" class="slider">
  </div>

  <div class="setting">
    <label><input type="checkbox" id="boldText"> Bold text</label>
  </div>

  <p style="font-size:11px;color:#666;margin-top:32px;">Reload open pages to see changes take effect.</p>

  <script src="options.js"></script>
</body>
</html>
