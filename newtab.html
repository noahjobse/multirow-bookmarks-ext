<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>New Tab</title>
  <link rel="stylesheet" href="bookmarks-bar.css">
  <style>
    body {
      margin: 0;
      background: #3b3b3f;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    #newtab-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      color: #888;
    }
    #newtab-content h1 {
      font-size: 1.5rem;
      font-weight: 300;
      color: #555;
    }
    @media (prefers-color-scheme: light) {
      body { background: #f5f5f5; }
      #newtab-content h1 { color: #aaa; }
    }
  </style>
</head>
<body>
  <div id="newtab-content">
  </div>
  <script src="newtab.js"></script>
</body>
</html>
